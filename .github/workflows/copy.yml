name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Set headless=false in CI to run the browser in headed mode
      PLAYWRIGHT_HEADLESS: "false"
      # Optional: mark CI for other logic
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          npm ci
          # Install Playwright browsers and system dependencies
          npx playwright install --with-deps

      - name: Run tests under Xvfb (headed)
        # xvfb-run provides a virtual display so headed browsers can start
        run: |
          # ensure xvfb is available on the runner; ubuntu-latest has it but install if needed
          sudo apt-get update
          sudo apt-get install -y xvfb
          # Run your test command under xvfb-run. Replace `npm test` with your actual test command.
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' npm test